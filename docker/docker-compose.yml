services:
  video2text:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: adolyming/video2text:latest
    container_name: video2text
    restart: unless-stopped
    ports:
      - "7881:7881"
    environment:
      HOST: 0.0.0.0
      PORT: 7881
      SSL_MODE: http
      HF_HOME: /app/.cache/huggingface
      MODELSCOPE_CACHE: /app/.cache/modelscope
      TORCH_HOME: /app/.cache/torch
      GRADIO_ANALYTICS_ENABLED: "false"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    # GPU 支持：有 GPU 则使用，无 GPU 则自动回退 CPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    volumes:
      - ../workspace:/app/workspace
      - ../.env:/app/.env
      - ../certs/video2text.pem:/app/video2text.pem:ro
      - ../certs/video2text-key.pem:/app/video2text-key.pem:ro
      - modelscope-cache:/app/.cache/modelscope
      - huggingface-cache:/app/.cache/huggingface
      - torch-cache:/app/.cache/torch

volumes:
  modelscope-cache:
  huggingface-cache:
  torch-cache:
